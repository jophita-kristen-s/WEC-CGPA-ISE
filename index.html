<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ISE CGPA Calculator — 2023-27 </title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8e6e0;--muted:#8a8a9a;
    --accent:#4ecca3;--accent2:#f0c060;--danger:#e25c5c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.6}
  header{border-bottom:1px solid var(--border);padding:1.5rem 2rem 1.2rem;background:var(--bg);position:sticky;top:0;z-index:100}
  header h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:500;letter-spacing:-0.02em}
  header h1 span{color:var(--accent)}
  header p{font-size:0.78rem;color:var(--muted);margin-top:2px}
  .hero{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
  .hero-cell{background:var(--bg);padding:1.4rem 2rem}
  .hero-lbl{font-size:0.68rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .hero-val{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:500;line-height:1;transition:color .4s}
  .hero-val.hi{color:var(--accent)}
  .hero-val.sm{font-size:1.8rem}
  .hero-sub{font-size:0.74rem;color:var(--muted);margin-top:5px}
  .grade-badge{display:inline-block;margin-top:8px;padding:2px 10px;border-radius:4px;font-size:0.7rem;font-weight:500;background:rgba(78,204,163,0.12);color:var(--accent)}
  .main{display:flex;min-height:calc(100vh - 195px)}
  .sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--border);padding:1.5rem 0;position:sticky;top:107px;height:calc(100vh - 107px);overflow-y:auto;background:var(--bg)}
  .sidebar-lbl{font-size:0.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 1.5rem;margin-bottom:.75rem}
  .sem-btn{display:block;width:100%;text-align:left;padding:.65rem 1.5rem;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--muted);transition:all .15s;border-left:2px solid transparent}
  .sem-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
  .sem-btn.active{color:var(--accent);border-left-color:var(--accent);background:rgba(78,204,163,.06)}
  .sem-btn small{display:block;font-size:.7rem;color:var(--muted);margin-top:1px}
  .sem-btn.active small{color:rgba(78,204,163,.6)}
  .sgpa-tag{float:right;font-size:.68rem;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:3px;color:var(--muted);margin-top:2px}
  .sem-btn.active .sgpa-tag{background:rgba(78,204,163,.12);color:var(--accent)}
  .content{flex:1;padding:2rem;overflow-x:auto}
  .sem-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
  .sem-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:500}
  .sem-stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .stat-chip{font-size:.72rem;color:var(--muted);padding:4px 10px;border-radius:4px;border:1px solid var(--border2)}
  .stat-chip span{color:var(--text);font-weight:500}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:6px 10px 10px;text-align:left;border-bottom:1px solid var(--border)}
  thead th:nth-child(n+4){text-align:center}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  tbody tr.mcc-row{opacity:.5}
  td{padding:10px 10px;font-size:.82rem;vertical-align:middle}
  td.code-cell{font-family:monospace;font-size:.73rem;color:var(--muted);white-space:nowrap}
  td.center{text-align:center}
  .mcc-tag{display:inline-block;font-size:.6rem;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.06);color:var(--muted);margin-left:5px;vertical-align:middle}
  .elec-tag{display:inline-block;font-size:.6rem;padding:1px 5px;border-radius:3px;background:rgba(240,192,96,.1);color:var(--accent2);margin-left:5px;vertical-align:middle}
  .oe-tag{display:inline-block;font-size:.6rem;padding:1px 5px;border-radius:3px;background:rgba(91,196,232,.1);color:#5bc4e8;margin-left:5px;vertical-align:middle}
  .course-picker{font-family:'DM Sans',sans-serif;font-size:.78rem;padding:4px 8px;background:var(--bg3);border:1px solid rgba(240,192,96,.3);color:var(--text);border-radius:5px;cursor:pointer;width:100%;max-width:280px;margin-top:4px}
  .course-picker.oe-picker{border-color:rgba(91,196,232,.3)}
  .course-picker:focus{outline:none;border-color:var(--accent2)}
  .course-picker.oe-picker:focus{border-color:#5bc4e8}
  select.grade-sel{font-family:'DM Sans',sans-serif;font-size:.8rem;padding:5px 8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:5px;cursor:pointer;width:68px;-webkit-appearance:none;text-align:center}
  select.grade-sel:focus{outline:none;border-color:var(--accent)}
  select.grade-sel.graded{border-color:rgba(78,204,163,.3)}
  select.grade-sel.failed{border-color:var(--danger);color:var(--danger)}
  .gp-num{font-size:.78rem;font-weight:500;color:var(--muted)}
  .gp-num.S{color:#4ecca3}.gp-num.A{color:#5bc4e8}.gp-num.B{color:#85d96e}
  .gp-num.C{color:#f0c060}.gp-num.D{color:#e8965a}.gp-num.E{color:#e06060}.gp-num.F{color:var(--danger)}
  .sgpa-row{background:var(--bg2);border-top:1px solid var(--border2) !important}
  .sgpa-row td{font-weight:500}
  .sgpa-val{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--accent)}
  .grade-ref{margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .grade-ref-lbl{font-size:.7rem;color:var(--muted);margin-right:4px}
  .grade-pill{font-size:.72rem;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--muted)}
  .grade-pill b{font-weight:500;color:var(--text);margin-right:3px}
  .reset-btn{font-family:'DM Sans',sans-serif;font-size:.75rem;padding:5px 14px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
  .reset-btn:hover{border-color:var(--danger);color:var(--danger)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  #content{animation:fadeUp .2s ease}
  @media(max-width:700px){
    .hero{grid-template-columns:1fr 1fr}.hero-cell:last-child{display:none}
    .main{flex-direction:column}
    .sidebar{width:100%;height:auto;position:relative;top:auto;display:flex;flex-wrap:wrap;gap:4px;padding:1rem;border-right:none;border-bottom:1px solid var(--border)}
    .sem-btn{width:auto;padding:5px 12px;border-left:none;border-bottom:2px solid transparent;border-radius:4px;font-size:.75rem}
    .sem-btn.active{border-bottom-color:var(--accent);border-left:none}
    .sidebar-lbl{display:none}
    .content{padding:1rem}
    .course-picker{max-width:200px}
  }
</style>
</head>
<body>

<header>
  <h1>ISE <span>CGPA</span> Calculator</h1>
  <p>B.E. Information Science &amp; Engineering &nbsp;·&nbsp; 2023-27 &nbsp;·&nbsp; WEC</p>
</header>

<div class="hero">
  <div class="hero-cell">
    <div class="hero-lbl">Cumulative GPA</div>
    <div class="hero-val hi" id="cgpa-val">—</div>
    <div class="grade-badge" id="cgpa-badge" style="display:none"></div>
    <div class="hero-sub" id="cgpa-sub">Select grades to calculate</div>
  </div>
  <div class="hero-cell">
    <div class="hero-lbl">Semester GPA</div>
    <div class="hero-val sm" id="sgpa-val">—</div>
    <div class="hero-sub" id="sgpa-sub">Active semester</div>
  </div>
  <div class="hero-cell">
    <div class="hero-lbl">Credits Graded</div>
    <div class="hero-val sm" id="credits-val">0</div>
    <div class="hero-sub" id="credits-sub">of total credits</div>
  </div>
</div>

<div class="main">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="content" id="content"></div>
</div>

<script>
const GP={S:10,A:9,B:8,C:7,D:6,E:5,F:0};
const SPEC={W:null,X:null,P:0,Z:0};
const ALL_GRADES=['','S','A','B','C','D','E','F','W','X','P','Z'];

const PE1=[
  {code:'ISA201',name:'Modern Databases'},
  {code:'ISA202',name:'Internet of Things'},
  {code:'ISA203',name:'Information Management System'},
  {code:'ISA204',name:'Software Modeling and Design'},
];
const PE23=[
  {code:'ISA205',name:'Pattern Recognition'},
  {code:'ISA206',name:'Block Chain Technology'},
  {code:'ISA207',name:'Deep Learning'},
  {code:'ISA208',name:'Ethical Hacking'},
  {code:'ISA209',name:'Natural Language Processing'},
  {code:'ISA210',name:'Exploratory Data Analysis'},
  {code:'ISA211',name:'Web Data Management'},
  {code:'ISA212',name:'Security and Privacy in Cloud'},
];
const PE45=[
  {code:'ISA213',name:'Big Data Analytics'},
  {code:'ISA214',name:'Data Exploration and Visualization'},
  {code:'ISA215',name:'Augmented Reality / Virtual Reality'},
  {code:'ISA216',name:'Business Analytics'},
  {code:'ISA217',name:'Social Media Analytics'},
  {code:'ISA218',name:'Human Computer Interaction'},
  {code:'ISA219',name:'UI/UX Design'},
  {code:'ISA220',name:'DevOps'},
];
const OE=[
  {code:'ECA302',name:'Communication Engineering'},
  {code:'AAA302',name:'Interior Design'},
];

const SEMESTERS=[
  {num:1,label:'First',credits:19.5,courses:[
    {code:'MAA101',name:'Mathematics – I',c:4},
    {code:'PHA101',name:'Physics',c:4},
    {code:'CYA101',name:'Chemistry',c:4},
    {code:'HSA101',name:'English for Communication',c:3},
    {code:'MEA101',name:'Workshop & Manufacturing Practice',c:1.5},
    {code:'PHA102',name:'Physics Laboratory',c:1.5},
    {code:'CYA102',name:'Chemistry Laboratory',c:1.5},
    {code:'FYA101',name:'Induction Programme',c:0,mcc:true},
  ]},
  {num:2,label:'Second',credits:17,courses:[
    {code:'MAA102',name:'Mathematics – II',c:4},
    {code:'EEA101',name:'Basic Electrical Engineering',c:4},
    {code:'CSA101',name:'Programming for Problem Solving',c:3},
    {code:'MEA102',name:'Engineering Graphics & CAD',c:3},
    {code:'EEA102',name:'Basic Electrical Eng. Laboratory',c:1.5},
    {code:'CSA102',name:'Programming Laboratory',c:1.5},
    {code:'CEA101',name:'Environmental Science',c:0,mcc:true},
  ]},
  {num:3,label:'Third',credits:18.5,courses:[
    {code:'ECA133',name:'Digital System Design',c:3},
    {code:'ISA101',name:'Python Programming',c:3},
    {code:'ISA102',name:'Data Structures',c:3},
    {code:'ISA103',name:'Introduction to Information Science',c:3},
    {code:'SHA101',name:'Biology for Engineers',c:2},
    {code:'ISA104',name:'Python Programming Laboratory',c:1.5},
    {code:'ISA105',name:'Data Structures Laboratory',c:1.5},
    {code:'ISA106',name:'Statistics with R Laboratory',c:1.5},
    {code:'SHA102',name:'Indian Constitution',c:0,mcc:true},
  ]},
  {num:4,label:'Fourth',credits:23.5,courses:[
    {code:'MAA106',name:'Mathematics for Computing',c:4},
    {code:'ISA107',name:'Operating Systems',c:3},
    {code:'ISA108',name:'OOP with Java',c:3},
    {code:'ISA109',name:'Foundations of Data Science',c:3},
    {code:'ISA110',name:'Design & Analysis of Algorithms',c:3},
    {code:'ISA111',name:'OS Lab with UNIX/Linux',c:1.5},
    {code:'ISA112',name:'OOP with Java Laboratory',c:1.5},
    {code:'ISA113',name:'Algorithms Laboratory',c:1.5},
    {code:'OE4',name:'Open Elective',c:3,elec:'oe',opts:OE},
  ]},
  {num:5,label:'Fifth',credits:20.5,courses:[
    {code:'ISA114',name:'Database Management System',c:3},
    {code:'ISA115',name:'Information Theory & Coding',c:4},
    {code:'ISA116',name:'Computer Networks',c:3},
    {code:'ISA117',name:'Machine Learning',c:3},
    {code:'PE1',name:'Program Elective – I',c:3,elec:'pe1',opts:PE1},
    {code:'ISA118',name:'DBMS Laboratory',c:1.5},
    {code:'ISA119',name:'Computer Networks Laboratory',c:1.5},
    {code:'ISA120',name:'Machine Learning Laboratory',c:1.5},
    {code:'OE5',name:'Open Elective',c:3,elec:'oe',opts:OE},
    {code:'SHA103',name:'Essence of Indian Traditional Knowledge',c:0,mcc:true},
  ]},
  {num:6,label:'Sixth',credits:24,courses:[
    {code:'ISA121',name:'Information Security',c:3},
    {code:'ISA122',name:'Information Storage & Retrieval',c:3},
    {code:'ISA123',name:'Cloud Computing',c:3},
    {code:'ISA124',name:'Data Mining & Warehousing',c:4},
    {code:'PE2',name:'Program Elective – II',c:3,elec:'pe23',opts:PE23},
    {code:'PE3',name:'Program Elective – III',c:3,elec:'pe23',opts:PE23},
    {code:'ISA125',name:'Women and Employability',c:2},
    {code:'ISA126',name:'Information Retrieval Laboratory',c:1.5},
    {code:'ISA127',name:'Cloud Computing Laboratory',c:1.5},
    {code:'OE6',name:'Open Elective',c:3,elec:'oe',opts:OE},
  ]},
  {num:7,label:'Seventh',credits:19,courses:[
    {code:'ISA128',name:'Artificial Intelligence',c:3},
    {code:'ISA129',name:'Full Stack Development',c:3},
    {code:'HSA102',name:'Industrial Economics & Management',c:3},
    {code:'PE4',name:'Program Elective – IV',c:3,elec:'pe45',opts:PE45},
    {code:'PE5',name:'Program Elective – V',c:3,elec:'pe45',opts:PE45},
    {code:'ISA130',name:'AI Laboratory',c:1.5},
    {code:'ISA131',name:'Full Stack Dev. Laboratory',c:1.5},
    {code:'ISA132',name:'Seminar',c:1},
    {code:'OE7',name:'Open Elective',c:3,elec:'oe',opts:OE},
    {code:'ISA133',name:'Professional Ethics',c:0,mcc:true},
  ]},
  {num:8,label:'Eighth',credits:15,courses:[
    {code:'SWA1',name:'Open Elective via SWAYAM',c:2},
    {code:'SWA2',name:'Open Elective via SWAYAM',c:2},
    {code:'ISA134',name:'Comprehensive Test',c:1},
    {code:'ISA135',name:'Internship',c:2},
    {code:'ISA136',name:'Project Work',c:8},
  ]},
];

const grades={};
const electivePick={};
SEMESTERS.forEach(s=>s.courses.forEach(c=>{
  grades[c.code]='';
  if(c.elec) electivePick[c.code]='';
}));
let activeSem=1;

function getGP(g){
  if(!g)return null;
  if(g in GP)return GP[g];
  if(g in SPEC)return SPEC[g];
  return null;
}
function semGPA(idx){
  let sw=0,sc=0;
  SEMESTERS[idx].courses.forEach(c=>{
    if(c.mcc||c.c===0)return;
    const gp=getGP(grades[c.code]);
    if(gp===null)return;
    sw+=c.c*gp;sc+=c.c;
  });
  return sc===0?null:sw/sc;
}
function calcCGPA(){
  let sw=0,sc=0;
  SEMESTERS.forEach(s=>s.courses.forEach(c=>{
    if(c.mcc||c.c===0)return;
    const gp=getGP(grades[c.code]);
    if(gp===null)return;
    sw+=c.c*gp;sc+=c.c;
  }));
  return{cgpa:sc===0?null:sw/sc,total:sc};
}
function totalGradedCredits(){let t=0;SEMESTERS.forEach(s=>s.courses.forEach(c=>{if(!c.mcc&&c.c>0)t+=c.c;}));return t;}
function gradeLetter(v){
  if(v===null)return'';
  if(v>=9.5)return'Outstanding';if(v>=9)return'Excellent';
  if(v>=8)return'Very Good';if(v>=7)return'Good';
  if(v>=6)return'Average';return'Below Average';
}

function updateHeader(){
  const{cgpa,total}=calcCGPA();
  const sgpa=semGPA(activeSem-1);
  const totCr=totalGradedCredits();
  const cEl=document.getElementById('cgpa-val');
  const badge=document.getElementById('cgpa-badge');
  if(cgpa!==null){
    cEl.textContent=cgpa.toFixed(2);cEl.style.color='var(--accent)';
    badge.textContent=gradeLetter(cgpa);badge.style.display='inline-block';
    document.getElementById('cgpa-sub').textContent='Based on '+total.toFixed(1)+' credits';
  }else{
    cEl.textContent='—';cEl.style.color='';badge.style.display='none';
    document.getElementById('cgpa-sub').textContent='Select grades to calculate';
  }
  document.getElementById('sgpa-val').textContent=sgpa!==null?sgpa.toFixed(2):'—';
  document.getElementById('sgpa-sub').textContent='Semester '+activeSem+' — '+SEMESTERS[activeSem-1].label;
  document.getElementById('credits-val').textContent=total.toFixed(1);
  document.getElementById('credits-sub').textContent='of '+totCr+' total graded credits';
  SEMESTERS.forEach(function(s,i){
    var tag=document.getElementById('stag-'+s.num);
    if(!tag)return;
    var g=semGPA(i);tag.textContent=g!==null?g.toFixed(2):'';
  });
}

function renderSidebar(){
  var sb=document.getElementById('sidebar');
  sb.innerHTML='<div class="sidebar-lbl">Semesters</div>';
  SEMESTERS.forEach(function(s){
    var btn=document.createElement('button');
    btn.className='sem-btn'+(s.num===activeSem?' active':'');
    btn.id='sbtn-'+s.num;
    btn.innerHTML='Semester '+s.num+'<span class="sgpa-tag" id="stag-'+s.num+'"></span><small>'+s.label+' &nbsp;·&nbsp; '+s.credits+' cr</small>';
    btn.onclick=function(){switchSem(s.num);};
    sb.appendChild(btn);
  });
}

function switchSem(n){
  activeSem=n;
  document.querySelectorAll('.sem-btn').forEach(function(b){b.classList.remove('active');});
  var btn=document.getElementById('sbtn-'+n);if(btn)btn.classList.add('active');
  renderContent();updateHeader();
}

function electivePickerHTML(c){
  var chosen=electivePick[c.code]||'';
  var isOE=c.elec==='oe';
  var cls='course-picker'+(isOE?' oe-picker':'');
  var opts='<option value="">— choose course —</option>';
  c.opts.forEach(function(o){
    opts+='<option value="'+o.code+'"'+(o.code===chosen?' selected':'')+'>'+o.code+' · '+o.name+'</option>';
  });
  return '<select class="'+cls+'" data-elec="'+c.code+'" onchange="setElective(this)">'+opts+'</select>';
}

function renderContent(){
  var sIdx=activeSem-1;
  var s=SEMESTERS[sIdx];
  var sgpa=semGPA(sIdx);
  var earnedC=0;
  s.courses.forEach(function(c){if(!c.mcc&&c.c>0&&grades[c.code]!=='')earnedC+=c.c;});

  var html='<div class="sem-header">'
    +'<div class="sem-title">Semester '+s.num+' &nbsp;—&nbsp; '+s.label+'</div>'
    +'<div class="sem-stats">'
    +'<div class="stat-chip">SGPA <span>'+(sgpa!==null?sgpa.toFixed(2):'—')+'</span></div>'
    +'<div class="stat-chip">Credits <span>'+earnedC.toFixed(1)+' / '+s.credits+'</span></div>'
    +'<button class="reset-btn" onclick="resetSem('+sIdx+')">Reset semester</button>'
    +'</div></div>'
    +'<table><thead><tr>'
    +'<th>Code</th><th>Course</th><th>Credits</th>'
    +'<th>Grade</th><th>Grade Pts</th><th>Weighted</th>'
    +'</tr></thead><tbody>';

  s.courses.forEach(function(c){
    var g=grades[c.code];
    var gp=getGP(g);
    var weighted=(gp!==null&&c.c>0)?(c.c*gp).toFixed(1):'—';
    var gpDisp=g&&gp!==null?'<span class="gp-num '+g+'">'+gp+'</span>':'<span style="color:var(--muted)">—</span>';
    var na='<span style="color:var(--muted);font-size:.75rem">—</span>';

    // Code display
    var codeDisp=c.code;
    if(c.elec&&electivePick[c.code]) codeDisp=electivePick[c.code];

    // Name cell
    var nameCell;
    if(c.elec){
      var tag=c.elec==='oe'?'<span class="oe-tag">OPEN</span>':'<span class="elec-tag">ELEC</span>';
      nameCell='<div><div style="font-size:.72rem;color:var(--muted);margin-bottom:3px">'+c.name+tag+'</div>'+electivePickerHTML(c)+'</div>';
    }else{
      var tag2=c.mcc?'<span class="mcc-tag">MCC</span>':'';
      nameCell=c.name+tag2;
    }

    html+='<tr class="'+(c.mcc?'mcc-row':'')+'">'
      +'<td class="code-cell">'+codeDisp+'</td>'
      +'<td>'+nameCell+'</td>'
      +'<td class="center" style="color:var(--muted)">'+(c.c===0?'—':c.c)+'</td>'
      +'<td class="center"><select class="grade-sel'+(g?' graded':'')+(g==='F'?' failed':'')+'" data-code="'+c.code+'" onchange="setGrade(this)">'
      +ALL_GRADES.map(function(gr){return'<option value="'+gr+'"'+(gr===g?' selected':'')+'>'+(gr||'—')+'</option>';}).join('')
      +'</select></td>'
      +'<td class="center">'+(c.mcc||c.c===0?na:gpDisp)+'</td>'
      +'<td class="center" style="font-weight:500">'+(c.mcc||c.c===0?na:weighted)+'</td>'
      +'</tr>';
  });

  var tsw=0,tsc=0;
  s.courses.forEach(function(c){if(c.mcc||c.c===0)return;var gp=getGP(grades[c.code]);if(gp===null)return;tsw+=c.c*gp;tsc+=c.c;});
  html+='<tr class="sgpa-row">'
    +'<td colspan="2" style="color:var(--muted);font-size:.78rem;font-weight:400">Semester Total</td>'
    +'<td class="center" style="color:var(--muted)">'+tsc.toFixed(1)+'</td>'
    +'<td></td>'
    +'<td class="center" style="color:var(--muted);font-size:.8rem">Σ = '+tsw.toFixed(1)+'</td>'
    +'<td class="center"><span class="sgpa-val">'+(sgpa!==null?sgpa.toFixed(2):'—')+'</span></td>'
    +'</tr></tbody></table>'
    +'<div class="grade-ref">'
    +'<span class="grade-ref-lbl">Grade Scale:</span>'
    +'<span class="grade-pill"><b>S</b>90–100 · 10</span>'
    +'<span class="grade-pill"><b>A</b>80–89 · 9</span>'
    +'<span class="grade-pill"><b>B</b>70–79 · 8</span>'
    +'<span class="grade-pill"><b>C</b>60–69 · 7</span>'
    +'<span class="grade-pill"><b>D</b>55–59 · 6</span>'
    +'<span class="grade-pill"><b>E</b>50–54 · 5</span>'
    +'<span class="grade-pill"><b>F</b>0–49 · 0</span>'
    +'<span class="grade-pill" style="color:var(--muted)"><b>W</b>Withdrawal</span>'
    +'<span class="grade-pill" style="color:var(--muted)"><b>X</b>Audit</span>'
    +'<span class="grade-pill" style="color:var(--muted)"><b>P</b>Pass (non-credit)</span>'
    +'</div>';

  document.getElementById('content').innerHTML=html;
}

function setGrade(sel){
  var code=sel.dataset.code;grades[code]=sel.value;
  sel.classList.toggle('graded',!!sel.value);
  sel.classList.toggle('failed',sel.value==='F');
  renderContent();updateHeader();
}
function setElective(sel){
  var code=sel.dataset.elec;
  electivePick[code]=sel.value;
  renderContent();updateHeader();
}
function resetSem(idx){
  SEMESTERS[idx].courses.forEach(function(c){grades[c.code]='';if(c.elec)electivePick[c.code]='';});
  renderContent();updateHeader();
}

function init(){renderSidebar();renderContent();updateHeader();}
init();
</script>
</body>
</html>
